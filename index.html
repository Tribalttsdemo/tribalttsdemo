<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Tribal TTS Demo</title>

<style>

body{
font-family: system-ui, Arial;
background: linear-gradient(135deg,#eef2ff,#f8fafc);
margin:0;
padding:40px;
color:#1f2937;
}

h1{
text-align:center;
margin-bottom:40px;
font-size:34px;
}

#content{
max-width:1100px;
margin:auto;
}

.language{
background:white;
border-radius:14px;
padding:25px;
margin-bottom:35px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.language h2{
margin-top:0;
font-size:26px;
border-bottom:2px solid #e5e7eb;
padding-bottom:10px;
}

.model{
margin-top:20px;
}

.model h3{
font-size:18px;
color:#4f46e5;
margin-bottom:10px;
}

.audio{
background:#f9fafb;
padding:12px;
border-radius:10px;
margin:10px 0;
display:flex;
flex-direction:column;
gap:6px;
}

.audio span{
font-size:14px;
color:#374151;
}

audio{
width:100%;
}

.footer{
text-align:center;
margin-top:50px;
color:#6b7280;
font-size:14px;
}

</style>

</head>

<body>

<h1>Tribal Language TTS Audio Demo</h1>

<div id="content"></div>

<div class="footer">
Generated from GitHub repository
</div>

<script>

const api = "https://api.github.com/repos/Tribalttsdemo/tribalttsdemo/contents";

async function loadData(){

const container=document.getElementById("content");

const languages=await fetch(api).then(r=>r.json());

for(const lang of languages){

if(lang.type!=="dir") continue;

let langDiv=document.createElement("div");
langDiv.className="language";
langDiv.innerHTML=`<h2>${lang.name}</h2>`;
container.appendChild(langDiv);

const models=await fetch(lang.url).then(r=>r.json());

for(const model of models){

if(model.type!=="dir") continue;

let modelDiv=document.createElement("div");
modelDiv.className="model";
modelDiv.innerHTML=`<h3>${model.name}</h3>`;
langDiv.appendChild(modelDiv);

const files=await fetch(model.url).then(r=>r.json());

for(const file of files){

if(file.name.endsWith(".wav") || file.name.endsWith(".mp3")){

let audioDiv=document.createElement("div");
audioDiv.className="audio";

audioDiv.innerHTML=`
<span>${file.name}</span>
<audio controls src="${file.download_url}"></audio>
`;

modelDiv.appendChild(audioDiv);

}

}

}

}

}

loadData();

</script>

</body>
</html>
