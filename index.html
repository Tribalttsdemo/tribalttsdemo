<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Tribal TTS Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(120deg,#eef2ff,#f8fafc);
color:#1f2937;
}

.hero{
text-align:center;
padding:70px 20px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
box-shadow:0 8px 30px rgba(0,0,0,0.15);
}

.hero h1{
font-size:42px;
margin-bottom:10px;
}

.hero p{
opacity:.9;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.language{
margin-bottom:50px;
}

.language h2{
font-size:28px;
margin-bottom:20px;
}

.models{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.model{
background:white;
border-radius:16px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:.25s;
}

.model:hover{
transform:translateY(-6px);
box-shadow:0 15px 35px rgba(0,0,0,0.12);
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
margin-bottom:10px;
}

.indicparler{background:#e0e7ff;color:#3730a3;}
.glowtts{background:#dcfce7;color:#166534;}
.glowtts_finetuned{background:#fef3c7;color:#92400e;}

.audio{
margin-top:10px;
padding:10px;
background:#f9fafb;
border-radius:10px;
}

audio{
width:100%;
margin-top:5px;
}

.footer{
text-align:center;
padding:40px;
color:#6b7280;
font-size:14px;
}

</style>

</head>

<body>

<div class="hero">
<h1>Tribal Language TTS Demo</h1>
<p>Speech samples generated using IndicParler and GlowTTS models</p>
</div>

<div class="container">
<div id="content"></div>
</div>

<div class="footer">
Audio files loaded directly from GitHub repository
</div>

<script>

const api="https://api.github.com/repos/Tribalttsdemo/tribalttsdemo/contents";

async function loadData(){

const container=document.getElementById("content");
const languages=await fetch(api).then(r=>r.json());

for(const lang of languages){

if(lang.type!=="dir") continue;

let langDiv=document.createElement("div");
langDiv.className="language";
langDiv.innerHTML=`<h2>${lang.name}</h2><div class="models"></div>`;
container.appendChild(langDiv);

const modelGrid=langDiv.querySelector(".models");

const models=await fetch(lang.url).then(r=>r.json());

for(const model of models){

if(model.type!=="dir") continue;

let modelCard=document.createElement("div");
modelCard.className="model";

let badgeClass=model.name;

modelCard.innerHTML=`
<div class="badge ${badgeClass}">${model.name}</div>
<div class="audio-list"></div>
`;

modelGrid.appendChild(modelCard);

const audioList=modelCard.querySelector(".audio-list");

const files=await fetch(model.url).then(r=>r.json());

for(const file of files){

if(file.name.endsWith(".wav")||file.name.endsWith(".mp3")){

let audioDiv=document.createElement("div");
audioDiv.className="audio";

audioDiv.innerHTML=`
<div>${file.name}</div>
<audio controls src="${file.download_url}"></audio>
`;

audioList.appendChild(audioDiv);

}

}

}

}

}

loadData();

</script>

</body>
</html>
