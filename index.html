<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #4f46e5;
    --secondary: #7c3aed;
    --accent: #06b6d4;
    --bg: #f8fafc;
    --surface: #ffffff;
    --surface2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-muted: #64748b;
    --radius: 16px;
    --shadow: 0 4px 24px rgba(0,0,0,0.07);
    --shadow-lg: 0 8px 40px rgba(79,70,229,0.13);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  header {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 60%, var(--accent) 100%);
    color: white;
    padding: 64px 24px 52px;
    text-align: center;
  }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 999px;
    padding: 4px 18px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  header h1 {
    font-size: clamp(24px, 5vw, 46px);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  header p {
    font-size: 16px;
    opacity: 0.85;
    font-weight: 300;
  }

  .nav-wrap {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  }
  .nav-tabs {
    display: flex; gap: 6px;
    max-width: 860px; margin: 0 auto;
    padding: 10px 20px; overflow-x: auto;
  }
  .nav-tabs button {
    flex-shrink: 0; background: none; border: none;
    padding: 8px 22px; border-radius: 999px;
    font-size: 14px; font-weight: 500;
    color: var(--text-muted); cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .nav-tabs button:hover { background: var(--surface2); color: var(--text); }
  .nav-tabs button.active { background: var(--primary); color: #fff; }

  main { max-width: 860px; margin: 0 auto; padding: 44px 20px 80px; }

  .lang-section { display: none; }
  .lang-section.visible { display: block; }

  .lang-header {
    display: flex; align-items: center;
    gap: 14px; margin-bottom: 30px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--border);
  }
  .lang-emoji { font-size: 32px; }
  .lang-header h2 { font-size: 24px; font-weight: 700; }

  /* ── CARD ── */
  .sample-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    margin-bottom: 18px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .sample-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }

  /* sentence row */
  .sentence-row {
    display: flex; align-items: flex-start;
    gap: 12px; margin-bottom: 20px;
  }
  .sid {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 3px 9px;
    font-size: 11px; font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-top: 2px;
  }
  .sentence {
    font-size: 16px; font-weight: 500;
    line-height: 1.7; color: var(--text);
  }

  /* audio rows */
  .audio-rows { display: flex; flex-direction: column; gap: 10px; }
  .audio-row {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .model-name {
    flex-shrink: 0; width: 160px;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em;
    display: flex; align-items: center; gap: 7px;
    color: var(--text);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  audio { flex: 1; height: 34px; min-width: 0; }

  footer {
    text-align: center; padding: 28px 20px;
    font-size: 13px; color: var(--text-muted);
    border-top: 1px solid var(--border);
  }

  @media (max-width: 560px) {
    .audio-row { flex-direction: column; align-items: flex-start; }
    .model-name { width: auto; }
    audio { width: 100%; }
  }

</style>
</head>

/* ── BUILD ── */
const navTabs = document.getElementById("navTabs");
const mainEl  = document.getElementById("main");

languages.forEach((lang, li) => {

  const btn = document.createElement("button");
  btn.textContent = `${lang.emoji} ${lang.id}`;
  if (li === 0) btn.classList.add("active");
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".lang-section").forEach(s => s.classList.remove("visible"));
    document.getElementById("sec-" + lang.id).classList.add("visible");
  });
  navTabs.appendChild(btn);

  const sec = document.createElement("section");
  sec.className = "lang-section" + (li === 0 ? " visible" : "");
  sec.id = "sec-" + lang.id;

  sec.innerHTML = `
    <div class="lang-header">
      <span class="lang-emoji">${lang.emoji}</span>
      <h2 style="color:${lang.color}">${lang.id}</h2>
    </div>`;

  lang.ids.forEach(id => {
    const key  = lang.id[0].toUpperCase() + id;
    const text = transcripts[key] || "";

    const audioRows = lang.models.map(m => `
      <div class="audio-row">
        <div class="model-name">
          <span class="dot" style="background:${m.color}"></span>
          ${m.name}
        </div>
        <audio controls preload="none">
          <source src="${lang.id}/${m.folder}/${lang.prefix}${id}.wav" type="audio/wav">
        </audio>
      </div>`).join("");

    const card = document.createElement("div");
    card.className = "sample-card";
    card.innerHTML = `
      <div class="sentence-row">
        <span class="sid">${key}</span>
        <div class="sentence">${text}</div>
      </div>
      <div class="audio-rows">${audioRows}</div>`;

    sec.appendChild(card);
  });

  mainEl.appendChild(sec);
});
