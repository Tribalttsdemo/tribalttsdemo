<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Tribal TTS Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:#f5f7fb;
}

header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:50px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.sample{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.sentence{
font-size:18px;
margin-bottom:15px;
}

.audioRow{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.audioBox{
background:#f9fafb;
padding:10px;
border-radius:8px;
}

label{
font-weight:600;
font-size:14px;
display:block;
margin-bottom:5px;
}

audio{
width:200px;
}

</style>

</head>

<body>

<header>
<h1>Tribal Language TTS Demo</h1>
</header>

<div class="container" id="content"></div>

<script>

/* transcripts */

const transcripts = {

B1:"तिनाई दावो कियों के तिनाई कीना मनखा हाथे हमेशा आलयोतों के तीनान निवास लड़ाई दंगड़ामा मारी सके से।",
B2:"तिनायु दावो करियों के केजरीवाल आपड़ी सरकार ने हार थी, जनता नौ ध्यान हटाड़वा नीं कोशिश करी रियों हतो।",
B3:"पेलखी शताब्दी में एरे मेरा लद्दाख कुषण सम्राज्य न एक भाग्य।",
B4:"मारी हाथे टेकामजी आवी रा छे",
B5:"कागद नी रसीदियों इंस्‍टाकार्ट नी दौलत से, अनें तिनां फेर सब टैम आपड़ी कन राखवुं जोवे।",

G1:"निम्मट सपय जन ना संग उन्द बेरा पेर वड़्कसोरे नाकुन कुबैय गिर्रदा आयता।",
G2:"तिकूर ता पोदेला सोन त लेहका चमके माले आकींग लेहका आन्ता",
G3:"हुचुक हाट्कना मुन्ने नाकुन पुट्त इद कोगेत ते उन्द कुबैय गिर्रदा ता विषय ता बारे ते वेहले आता।",
G4:"भारत ते तिन्दाना उन्द रीति आंद, केवल अंकाल तून मायहन आयो।",
G5:"भारतीय राजनीति ते संस्कृति नीति ता गल्ला कुबेय कास मंता"

};

/* models / folders */

const models = [
{ name:"Glow-TTS", path:"glowtts" },
{ name:"Glow-TTS Finetuned", path:"glowtts_finetuned" },
{ name:"Indic Parler TTS", path:"indicparler" }
];

const languages = ["Bhili","Gondi","Mundari","Santali"];

const container=document.getElementById("content");

Object.keys(transcripts).forEach(id=>{

const sentence=transcripts[id];

const block=document.createElement("div");
block.className="sample";

block.innerHTML=`<div class="sentence">${sentence}</div>`;

const audioRow=document.createElement("div");
audioRow.className="audioRow";

languages.forEach(lang=>{

models.forEach(model=>{

const box=document.createElement("div");
box.className="audioBox";

const src = `${lang}/${model.path}/${id}.wav`;

box.innerHTML=`
<label>${lang} – ${model.name}</label>
<audio controls src="${src}"></audio>
`;

audioRow.appendChild(box);

});

});

block.appendChild(audioRow);
container.appendChild(block);

});

</script>

</body>
</html>
