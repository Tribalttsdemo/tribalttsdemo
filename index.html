/* ── MODELS per language ── */
/* Santali → only glowtts + indicparler (no glowtts_finetuned) */
const allModels = [
  { name:"Indic Parler TTS",   folder:"indicparler",       color:"#4f46e5" },
  { name:"Glow-TTS",           folder:"glowtts",           color:"#0891b2" },
  { name:"Glow-TTS Finetuned", folder:"glowtts_finetuned", color:"#7c3aed" }

/* ── LANGUAGES ── */
const languages = [
  {
    id:"Bhili", label:"Bhili", emoji:"🌿",
    bg:"linear-gradient(135deg,#eef2ff,#e0e7ff)", color:"#4f46e5",
    desc:"Indo-Aryan tribal language · Rajasthan & Gujarat",
    prefix:"b",
    ids: Array.from({length:20}, (_,i) => i+1),
    models: allModels
  },
  {
    id:"Mundari", label:"Mundari", emoji:"🌾",
    bg:"linear-gradient(135deg,#f0fdf4,#dcfce7)", color:"#16a34a",

    prefix:"m",
    ids: Array.from({length:20}, (_,i) => i+1),
    models: allModels
  },
  {
    id:"Santali", label:"Santali", emoji:"🪘",
    bg:"linear-gradient(135deg,#fff7ed,#ffedd5)", color:"#ea580c",

    prefix:"s",
    ids: Array.from({length:20}, (_,i) => i+1),
    models: [
      { name:"Indic Parler TTS", folder:"indicparler", color:"#4f46e5" },
      { name:"Glow-TTS",         folder:"glowtts",     color:"#0891b2" }
    ]
  },
  {
    id:"Gondi", label:"Gondi", emoji:"🏞️",
    bg:"linear-gradient(135deg,#fdf4ff,#fae8ff)", color:"#9333ea",
    desc:"Dravidian tribal language · Central India",
    prefix:"g",
    ids: Array.from({length:15}, (_,i) => i+1),
    models: allModels
  }
];

/* ── BUILD PAGE ── */
const navTabs = document.getElementById("navTabs");
const mainEl  = document.getElementById("main");

languages.forEach((lang, li) => {

  /* nav button */
  const btn = document.createElement("button");
  btn.textContent = `${lang.emoji} ${lang.label}`;
  btn.dataset.lang = lang.id;
  if (li === 0) btn.classList.add("active");
  btn.addEventListener("click", () => {
    document.querySelectorAll(".nav-tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".lang-section").forEach(s => s.classList.remove("visible"));
    document.getElementById("sec-" + lang.id).classList.add("visible");
  });
  navTabs.appendChild(btn);

  /* section */
  const sec = document.createElement("section");
  sec.className = "lang-section" + (li === 0 ? " visible" : "");
  sec.id = "sec-" + lang.id;

  sec.innerHTML = `
    <div class="lang-header">
      <div class="lang-icon" style="background:${lang.bg}; color:${lang.color}">${lang.emoji}</div>
      <div>
        <h2 style="color:${lang.color}">${lang.label}</h2>
        <p>${lang.desc} &nbsp;·&nbsp; ${lang.ids.length} samples &nbsp;·&nbsp; ${lang.models.length} models</p>
      </div>
    </div>
  `;

  lang.ids.forEach(id => {

    /* transcript key: uppercase prefix + number, e.g. B1, M3, S10, G5 */
    const key  = lang.id[0].toUpperCase() + id;
    const text = transcripts[key] || "";

    const card = document.createElement("div");
    card.className = "sample-card";

    /* audio boxes — one per model, path: LanguageName/folder/prefix+id.wav */
    const audioBoxes = lang.models.map(m => {
      const src = `${lang.id}/${m.folder}/${lang.prefix}${id}.wav`;
      return `
        <div class="audio-box">
          <div class="audio-label">
            <span class="dot" style="background:${m.color}"></span>
            ${m.name}
          </div>
          <audio controls preload="none">
            <source src="${src}" type="audio/wav">
          </audio>
        </div>`;
    }).join("");

    card.innerHTML = `
      <div class="card-top">
        <span class="sentence-id">${key}</span>
        <div class="sentence-text">${text}</div>
      </div>
      <div class="audio-grid">${audioBoxes}</div>
    `;

    sec.appendChild(card);
  });

  mainEl.appendChild(sec);
});
