function fileToKey(langName, fileName) {
  /* use explicit map, fallback to first char uppercase */
  const prefix = langPrefix[langName.toLowerCase()] || langName[0].toUpperCase();
  const num    = parseInt(fileName.replace(/\D/g, ""), 10);
  return prefix + num;
}

  const root     = await fetch(api).then(r => r.json());
  const langDirs = root.filter(l => l.type === "dir");

  /* build nav + empty sections first */
  langDirs.forEach((lang, li) => {
    const btn = document.createElement("button");
    btn.className   = "nav-btn" + (li === 0 ? " active" : "");
    btn.textContent = lang.name;
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".language").forEach(s => s.classList.remove("visible"));
      document.getElementById("lang-" + lang.name).classList.add("visible");
    });
    navInner.appendChild(btn);

    const sec = document.createElement("div");
    sec.className = "language" + (li === 0 ? " visible" : "");
    sec.id = "lang-" + lang.name;
    sec.innerHTML = `<div class="lang-heading">${lang.name}</div>`;
    container.appendChild(sec);
  });

  /* load content per language */
  for (const lang of langDirs) {
    const sec       = document.getElementById("lang-" + lang.name);
    const modelList = await fetch(lang.url).then(r => r.json());
    const modelDirs = modelList.filter(m => m.type === "dir");

    /* fetch files for each model folder */
    const modelData = {};
    for (const model of modelDirs) {
      const files = await fetch(model.url).then(r => r.json());
      modelData[model.name] = files
        .filter(f => f.name.endsWith(".wav") || f.name.endsWith(".mp3"))
        .sort((a, b) =>
          parseInt(a.name.replace(/\D/g,""), 10) -
          parseInt(b.name.replace(/\D/g,""), 10)
        );
    }

    /* union of all filenames across models, sorted numerically */
    const allFileNames = [...new Set(
      Object.values(modelData).flat().map(f => f.name)
    )].sort((a, b) =>
      parseInt(a.replace(/\D/g,""), 10) -
      parseInt(b.replace(/\D/g,""), 10)
    );

    /* one card per sentence */
    for (const fileName of allFileNames) {
      const key  = fileToKey(lang.name, fileName);
      const text = transcripts[key] || "";

      const card = document.createElement("div");
      card.className = "sample-card";
      card.innerHTML = `
        <div class="transcript">
          <span>${text}</span>
        </div>
        <div class="audio-rows"></div>`;

      const audioRows = card.querySelector(".audio-rows");

      /* models in fixed order */
      const orderedModels = [
        ...modelOrder.filter(m => modelData[m]),
        ...Object.keys(modelData).filter(m => !modelOrder.includes(m))
      ];

      for (const modelFolder of orderedModels) {
        const match = modelData[modelFolder].find(f => f.name === fileName);
        if (!match) continue;

        const info = modelNames[modelFolder] || { label: modelFolder, cls: "indicparler" };

        const row = document.createElement("div");
        row.className = "audio-row";
        row.innerHTML = `
          <span class="badge ${info.cls}">${info.label}</span>
          <audio controls preload="none">
            <source src="${match.download_url}" type="audio/wav">
          </audio>`;

        audioRows.appendChild(row);
      }

      sec.appendChild(card);
    }
  }

  document.getElementById("loading").style.display = "none";
}

loadData();

</script>
</body>
</html>
